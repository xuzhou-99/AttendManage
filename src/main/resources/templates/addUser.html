<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:aty="http://www.thunisoft.com">
  <head>
    <meta type="aty-meta" name="javaLocation" content="com.thunisoft.ygkq.ygkq.controller.AddUserController.java" th:remove="all">
    <meta type="aty-meta" name="cssLocation" content="css/addUser.css" th:remove="all">
    <meta type="aty-meta" name="jsLocation" content="js/addUser.js" th:remove="all">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
    <meta name="renderer" content="webkit">
    <link rel="stylesheet" th:href="@{/webjars/artery/artery-ui.css}" />
    <link rel="stylesheet" aty:import>
    <link rel="stylesheet" th:href="@{/css/addUser.css}" />
    <title>ygkq</title>
    <base th:href="@{/}" />
  </head>
  <body>
    <div id="app" style="height:100%;width:100%" v-cloak>
      <aty-form ref="form" :data="formData">
        <aty-input label="姓名" v-model="formData.name" label-position="left" :label-width="80" required class="fd-input"></aty-input>
        <aty-input label="员工编号" v-model="formData.bh" label-position="left" :label-width="80" required class="fd-input"></aty-input>
        <aty-input label="部门" v-model="formData.corp" label-position="left" :label-width="80" class="fd-input"></aty-input>
        <aty-input label="标识" v-model="formData.bs" label-position="left" :label-width="80" class="fd-input"></aty-input>
        <aty-input label="初始密码" v-model="formData.password" label-position="left" :label-width="80" class="fd-input"
                   value="123">123</aty-input>
        <aty-button text="确定" @click="addUser('form')" class="fd-button-add"></aty-button>
      </aty-form>
    </div>
  </body>
  <script type="text/javascript" th:src="@{/webjars/vue/vue.min.js}"></script>
  <script type="text/javascript" th:src="@{/webjars/artery/artery-ui.min.js}"></script>
  <script type="text/javascript" aty:import></script>
  <script type="text/javascript" th:src="@{/js/addUser.js}"></script>
</html>
